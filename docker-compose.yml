services:
  # ==================== INFRASTRUCTURE SERVICES ====================

  # PostgreSQL Database
  postgres:
    image: postgres:14-alpine
    container_name: order-tracking-postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: orders_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./order-service/db/schema.sql:/docker-entrypoint-initdb.d/01-order-schema.sql
      - ./stock-service/db/schema.sql:/docker-entrypoint-initdb.d/02-stock-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d orders_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - order-tracking-network

  # RabbitMQ Message Broker
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: order-tracking-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin
    ports:
      - "5673:5672" # AMQP protocol
      - "15673:15672" # Management UI
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - order-tracking-network

  # Elasticsearch
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: order-tracking-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9201:9200"
      - "9301:9300"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test:
        ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - order-tracking-network

  # ==================== APPLICATION SERVICES ====================

  # Order Service (gRPC)
  order-service:
    build:
      context: .
      dockerfile: order-service/Dockerfile
    container_name: order-tracking-order-service
    environment:
      DB_URL: postgres://admin:admin@postgres:5432/orders_db?sslmode=disable
      RABBITMQ_URL: amqp://admin:admin@rabbitmq:5672/
      GRPC_PORT: 50051
      STOCK_SERVICE_ADDR: stock-service:50052
    ports:
      - "50061:50051"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      stock-service:
        condition: service_started
    restart: on-failure
    networks:
      - order-tracking-network

  # Stock Service (gRPC)
  stock-service:
    build:
      context: .
      dockerfile: stock-service/Dockerfile
    container_name: order-tracking-stock-service
    environment:
      DB_URL: postgres://admin:admin@postgres:5432/orders_db?sslmode=disable
      RABBITMQ_URL: amqp://admin:admin@rabbitmq:5672/
      GRPC_PORT: 50052
    ports:
      - "50062:50052"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: on-failure
    networks:
      - order-tracking-network

  # Analytics Service (HTTP REST)
  analytics-service:
    build:
      context: .
      dockerfile: analytics-service/Dockerfile
    container_name: order-tracking-analytics-service
    environment:
      ELASTICSEARCH_URL: http://elasticsearch:9200
      RABBITMQ_URL: amqp://admin:admin@rabbitmq:5672/
      HTTP_PORT: 8080
    ports:
      - "8081:8080"
    depends_on:
      elasticsearch:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: on-failure
    networks:
      - order-tracking-network

# ==================== NETWORKS ====================
networks:
  order-tracking-network:
    driver: bridge

# ==================== VOLUMES ====================
volumes:
  postgres_data:
    driver: local
  rabbitmq_data:
    driver: local
  elasticsearch_data:
    driver: local
